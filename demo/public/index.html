<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRMS AI Compliance Agent - Realtime Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #f8fafc; color: #1e293b; }
    .page { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { color: #64748b; font-size: 14px; margin-top: 4px; }
    .header-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; font-size: 14px; font-weight: 500; background: white; transition: all 0.2s; }
    .btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .btn-primary { background: #1d4ed8; color: white; border-color: #1d4ed8; }
    .btn-primary:hover { background: #1e40af; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-danger { background: #dc2626; color: white; border-color: #dc2626; }
    .btn-success { background: #16a34a; color: white; border-color: #16a34a; }
  </style>
</head>
<body>
<div class="page" id="app"></div>
<script src="app.js"></script>
</body>
</html>
